name: loanrisk_env
version: 1.0.0
description: "AI agent learns to assess bank loan applications"
environment:
  type: http
  port: 7860
inference:
  script: inference.py
tasks:
  - id: easy
    description: "Single applicant, clear-cut case"
    difficulty: easy
  - id: medium
    description: "Exception clauses must be evaluated"
    difficulty: medium
  - id: hard
    description: "Missing data, co-applicants, overlapping exceptions"
    difficulty: hard
